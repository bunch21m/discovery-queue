services:
  db:
    image: postgres:15
    environment:
      # Use the *_FILE convention so the image reads credentials from files
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB_FILE: /run/secrets/postgres_db
    volumes:
      - db_data:/var/lib/postgresql/data
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
  
  gameEmbeddings:
    image: pgvector/pgvector:pg18-trixie
    volumes:
      - game_embeddings_data:/var/lib/postgresql
    environment:
      POSTGRES_USER_FILE: /run/secrets/postgres_user
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB_FILE: /run/secrets/postgres_db
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    ports:
      - "5433:5432"

  web:
    build: .
    stdin_open: true # docker run -i
    tty: true        # docker run -t
    depends_on:
      - db
      - gameEmbeddings
    volumes:
      - .:/app:cached
    secrets:
      - postgres_user
      - postgres_password
      - postgres_db
    ports:
      - "5000:5000"
    command: >
      bash -c "python -m src.ingest.initializeDatabase && python -m src.ingest.createGameEmbeddings && python -m src.webapp.App"

volumes:
  db_data:
  game_embeddings_data:

secrets:
  postgres_user:
    file: .secrets/postgres_user
  postgres_password:
    file: .secrets/postgres_password
  postgres_db:
    file: .secrets/postgres_db